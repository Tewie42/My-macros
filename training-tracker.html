<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training Tracker</title>
<link rel="stylesheet" href="css/power style.css">
</head>

<body>

<h1 class="page-title">Training Tracker</h1>

<!-- Setup Card -->
<div class="card">
    <label for="split">Training Split</label>
    <select id="split">
        <option value="ppl">Push / Pull / Legs</option>
        <option value="upperlower">Upper / Lower</option>
        <option value="frontback">Front / Back</option>
        <option value="fullbody">Full Body</option>
    </select>

    <label for="sex">Sex</label>
    <select id="sex">
        <option value="female">Female</option>
        <option value="male">Male</option>
    </select>

    <button onclick="startWorkout()">Start Workout</button>
</div>
<!-- Strength Questionnaire -->
<div class="card" id="strengthCard">
    <h2>Strength Questionnaire</h2>

    <label>Bench Press 3RM (kg)</label>
    <input type="number" id="bench3rm">

    <label>Squat 3RM (kg)</label>
    <input type="number" id="squat3rm">

    <label>Deadlift 3RM (kg)</label>
    <input type="number" id="dead3rm">

    <button onclick="saveStrength()">Save Strength Profile</button>
</div>

<!-- Workout Screen (JS will populate this) -->
<div id="workoutScreen" class="card hidden"></div>

<!-- DOMS Screen (JS will populate this) -->
<div id="domsScreen" class="card hidden"></div>

<script>
// Placeholder functions — we will build these next
function startWorkout() {
    const screen = document.getElementById("workoutScreen");
    screen.classList.remove("hidden");
    screen.innerHTML = `
        <h2>Today's Workout</h2>
        <p>Workout generator coming next...</p>
    `;
}

function showDOMS() {
    const doms = document.getElementById("domsScreen");
    doms.classList.remove("hidden");
    doms.innerHTML = `
        <h2>DOMS Check-In</h2>
        <p>Rate your soreness from the last session</p>
        <input type="range" min="0" max="5" id="domsRating">
        <button onclick="submitDOMS()">Submit</button>
    `;
}
function saveStrength() {
    const bench = parseFloat(document.getElementById("bench3rm").value);
    const squat = parseFloat(document.getElementById("squat3rm").value);
    const dead = parseFloat(document.getElementById("dead3rm").value);

    // Epley Formula: 1RM = weight * (1 + reps/30)
    const bench1RM = bench * (1 + 3/30);
    const squat1RM = squat * (1 + 3/30);
    const dead1RM = dead * (1 + 3/30);

    const profile = {
        bench3RM: bench,
        squat3RM: squat,
        dead3RM: dead,
        bench1RM: bench1RM,
        squat1RM: squat1RM,
        dead1RM: dead1RM
    };

    localStorage.setItem("strengthProfile", JSON.stringify(profile));

    alert("Strength profile saved");
}

function submitDOMS() {
    alert("DOMS rating saved");
}
</script>

</body>
</html>
