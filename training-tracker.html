<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training Tracker</title>
<link rel="stylesheet" href="css/power style.css">
</head>

<body>

<h1 class="page-title">Training Tracker</h1>

<!-- Setup Card -->
<div class="card">
    <label for="split">Training Split</label>
    <select id="split">
        <option value="ppl">Push / Pull / Legs</option>
        <option value="upperlower">Upper / Lower</option>
        <option value="frontback">Front / Back</option>
        <option value="fullbody">Full Body</option>
    </select>

    <label for="sex">Sex</label>
    <select id="sex">
        <option value="female">Female</option>
        <option value="male">Male</option>
    </select>

    <button onclick="startWorkout()">Start Workout</button>
</div>
<!-- Strength Questionnaire -->
<div class="card" id="strengthCard">
    <h2>Strength Questionnaire</h2>

    <label>Bench Press 3RM (kg)</label>
    <input type="number" id="bench3rm">

    <label>Squat 3RM (kg)</label>
    <input type="number" id="squat3rm">

    <label>Deadlift 3RM (kg)</label>
    <input type="number" id="dead3rm">

    <button onclick="saveStrength()">Save Strength Profile</button>
</div>

<!-- Workout Screen (JS will populate this) -->
<div id="workoutScreen" class="card hidden"></div>

<!-- DOMS Screen (JS will populate this) -->
<div id="domsScreen" class="card hidden"></div>

<script>
// Placeholder functions — we will build these next
function startWorkout() {
    const screen = document.getElementById("workoutScreen");
    screen.classList.remove("hidden");
    screen.innerHTML = `
        <h2>Today's Workout</h2>
        <p>Workout generator coming next...</p>
    `;
}

function showDOMS() {
    const doms = document.getElementById("domsScreen");
    doms.classList.remove("hidden");
    doms.innerHTML = `
        <h2>DOMS Check-In</h2>
        <p>Rate your soreness from the last session</p>
        <input type="range" min="0" max="5" id="domsRating">
        <button onclick="submitDOMS()">Submit</button>
    `;
}
function saveStrength() {
    const bench = parseFloat(document.getElementById("bench3rm").value);
    const squat = parseFloat(document.getElementById("squat3rm").value);
    const dead = parseFloat(document.getElementById("dead3rm").value);

    // Epley Formula: 1RM = weight * (1 + reps/30)
    const bench1RM = bench * (1 + 3/30);
    const squat1RM = squat * (1 + 3/30);
    const dead1RM = dead * (1 + 3/30);

    const profile = {
        bench3RM: bench,
        squat3RM: squat,
        dead3RM: dead,
        bench1RM: bench1RM,
        squat1RM: squat1RM,
        dead1RM: dead1RM
    };

    localStorage.setItem("strengthProfile", JSON.stringify(profile));

    alert("Strength profile saved");
}

function submitDOMS() {
    alert("DOMS rating saved");
}
   <script type="module">
import { generatePPLWorkout } from "./js/workouts/ppl.js";

let currentWorkout = null;

function startWorkout() {
    const sex = document.getElementById("sex").value;
    const strengthProfile = JSON.parse(localStorage.getItem("strengthProfile"));

    if (!strengthProfile) {
        alert("Please complete the strength questionnaire first.");
        return;
    }

    // Generate PPL workout
    currentWorkout = generatePPLWorkout(sex, strengthProfile);

    renderWorkoutScreen();
}

window.startWorkout = startWorkout;
    function renderWorkoutScreen() {
    const screen = document.getElementById("workoutScreen");
    screen.classList.remove("hidden");

    screen.innerHTML = `
        <h2>Today's Workout</h2>

        <div class="card">
            <button onclick="showSection('push')">Push</button>
            <button onclick="showSection('pull')">Pull</button>
            <button onclick="showSection('legs')">Legs</button>
        </div>

        <div id="pushSection" class="hidden"></div>
        <div id="pullSection" class="hidden"></div>
        <div id="legsSection" class="hidden"></div>
    `;

    renderSection("push", currentWorkout.push);
    renderSection("pull", currentWorkout.pull);
    renderSection("legs", currentWorkout.legs);
}

window.renderWorkoutScreen = renderWorkoutScreen;
 function renderSection(name, exercises) {
    const container = document.getElementById(name + "Section");

    let html = "";

    exercises.forEach((ex, index) => {
        html += `
            <div class="card mt-20">
                <h3>${ex.name}</h3>

                <p><strong>Recommended Load:</strong> ${ex.load}</p>
                <p><strong>Reps:</strong> ${ex.reps}</p>
                <p><strong>Sets:</strong> ${ex.sets}</p>

                <label>Weight Used (kg)</label>
                <input type="number" id="${name}_weight_${index}">

                <label>Reps Completed</label>
                <input type="number" id="${name}_reps_${index}">

                <label>Difficulty</label>
                <select id="${name}_difficulty_${index}">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                    <option value="impossible">Impossible</option>
                </select>
            </div>
        `;
    });

    container.innerHTML = html;
}

window.renderSection = renderSection;
function showSection(section) {
    document.getElementById("pushSection").classList.add("hidden");
    document.getElementById("pullSection").classList.add("hidden");
    document.getElementById("legsSection").classList.add("hidden");

    document.getElementById(section + "Section").classList.remove("hidden");
}

window.showSection = showSection;
   

</script>

</body>
</html>
