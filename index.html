<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Macro Calculator</title>
<link rel="stylesheet" href="css/power style.css">
 
</head>
<body>

<h2>Macro Calculator</h2>

<label>Sex</label>
<select id="sex">
    <option value="male">Male</option>
    <option value="female">Female</option>
</select>

<label>age </label>
<input type="number" id="age">   

<label>Height (cm)</label>
<input type="number" id="height">

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Goal Weight (kg)</label>
<input type="number" id="goalWeight">

<label>Activity Level</label>
<select id="activity">
    <option value="1.2">Sedentary</option>
    <option value="1.25">Lightly Active</option>
    <option value="1.735">Moderately Active</option>
    <option value="1.8">Very Active</option>
    <option value="1.9">Extremely Active</option>
</select>

<button onclick="calculate()">Calculate</button>

<div id="output" class="result" style="display:none;"></div>

<script>
function calculate() {
    const sex = document.getElementById("sex").value;
    const height = parseFloat(document.getElementById("height").value);
    const weight = parseFloat(document.getElementById("weight").value);
    const age = parseFloat(document.getElementById("age").value);
    const goalWeight = parseFloat(document.getElementById("goalWeight").value);
    const activity = parseFloat(document.getElementById("activity").value);

    // Mifflin-St Jeor BMR
    let BMR = (11 * weight) + (6.25 * height) - (5 * age);
    if (sex === "male") BMR += 5;
    else BMR -= 161;

    const TDEE = BMR * activity;

    // Calorie target: small deficit/surplus based on goal
    const calorieTarget = goalWeight < weight ? TDEE - 400 : TDEE + 300;

    // Macro split
    const protein = goalWeight * 2.2; // grams
    const fat = weight * 0.5;       // grams
    const caloriesFromProtein = protein * 4;
    const caloriesFromFat = fat * 9;
    const remainingCalories = calorieTarget - (caloriesFromProtein + caloriesFromFat);
    const carbs = remainingCalories / 4;

    // Timeline using 7700 kcal per kg
    const kgDifference = Math.abs(weight - goalWeight);
    const dailyDeficit = TDEE - calorieTarget;

    let weeksToGoal = "N/A";

    if (dailyDeficit !== 0) {
        const days = (7700 * kgDifference) / Math.abs(dailyDeficit);
        weeksToGoal = (days / 7).toFixed(1);
    }

    document.getElementById("output").style.display = "block";
    document.getElementById("output").innerHTML = `
        <h3>Your Results</h3>
        <strong>Calorie Target:</strong> ${Math.round(calorieTarget)} kcal<br><br>
        <strong>Protein:</strong> ${Math.round(protein)} g<br>
        <strong>Carbs:</strong> ${Math.round(carbs)} g<br>
        <strong>Fat:</strong> ${Math.round(fat)} g<br><br>
        <strong>Estimated Time to Reach Goal:</strong><br>
        ${weeksToGoal} weeks
    `;
}

  <table class="activity-table">
    <tr>
        <th>Level</th>
        <th>Description</th>
    </tr>
    <tr>
        <td>Sedentary</td>
        <td>Little to no exercise</td>
    </tr>
    <tr>
        <td>Lightly Active</td>
        <td>Light exercise 1–3 days/week</td>
    </tr>
    <tr>
        <td>Moderately Active</td>
        <td>Moderate exercise 3–5 days/week</td>
    </tr>
    <tr>
        <td>Very Active</td>
        <td>Hard exercise 6–7 days/week</td>
    </tr>
    <tr>
        <td>Extremely Active</td>
        <td>Physical job or intense training</td>
    </tr>
</table>
  
}
</script>

</body>
</html>
